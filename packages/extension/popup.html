<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Visual Edit</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 240px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #111;
      color: #f5f5f5;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px 16px 10px;
      border-bottom: 1px solid #222;
    }
    .logo {
      width: 22px; height: 22px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      font-size: 12px;
    }
    .title { font-size: 14px; font-weight: 600; }
    .body { padding: 14px 16px; display: flex; flex-direction: column; gap: 10px; }
    .toggle-row {
      display: flex; align-items: center; justify-content: space-between;
    }
    .toggle-label { font-size: 13px; color: #ccc; }
    .toggle {
      position: relative; width: 40px; height: 22px;
      cursor: pointer;
    }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .slider {
      position: absolute; inset: 0;
      background: #333; border-radius: 22px;
      transition: .2s;
    }
    .slider:before {
      content: '';
      position: absolute;
      width: 16px; height: 16px;
      left: 3px; top: 3px;
      background: white; border-radius: 50%;
      transition: .2s;
    }
    input:checked + .slider { background: #6366f1; }
    input:checked + .slider:before { transform: translateX(18px); }
    .status {
      font-size: 11px;
      padding: 6px 10px;
      border-radius: 6px;
      background: #1a1a1a;
      color: #888;
    }
    .status.online { color: #4ade80; }
    .status.offline { color: #f87171; }
    .tip { font-size: 11px; color: #555; line-height: 1.5; }
    .shortcut {
      font-size: 11px; color: #666;
      display: flex; flex-direction: column; gap: 4px;
    }
    .key {
      display: inline-block;
      background: #222; border: 1px solid #333;
      border-radius: 3px; padding: 1px 5px;
      font-family: monospace; font-size: 10px;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">✏</div>
    <span class="title">Visual Edit</span>
  </div>
  <div class="body">
    <div class="toggle-row">
      <span class="toggle-label">Ativar edição</span>
      <label class="toggle">
        <input type="checkbox" id="enableToggle" />
        <span class="slider"></span>
      </label>
    </div>
    <div class="status" id="bridgeStatus">Verificando bridge...</div>
    <div class="shortcut">
      <span><span class="key">hover</span> — destaca elemento</span>
      <span><span class="key">click</span> — abre painel de estilos</span>
      <span><span class="key">dbl-click</span> — edita texto inline</span>
      <span><span class="key">Esc</span> — deseleciona</span>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
